set -g mouse on
set-option -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -s extended-keys always
set -as terminal-features 'xterm-ghostty:extkeys'
set -ga terminal-features ",xterm-ghostty:hyperlinks"
set -ga terminal-overrides ",xterm-ghostty:Hls"
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -s set-clipboard on
set -g focus-events on
set -g allow-passthrough on

# Remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Start window numbering at 1 (easier to reach than 0)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

# Vi mode
set -g status-keys vi
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel

# Increase history limit
set -g history-limit 50000

# Reduce escape-sequence latency for Vim/Neovim.
set -sg escape-time 0

# Monitor activity in other windows
setw -g monitor-activity on

# Reload tmux config with Prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
bind e new-window -c "#{pane_current_path}" "yazi"
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind s display-popup -w 100% -h 100% -E "$HOME/.scripts/tmux-session-picker"
bind S switch-client -l
unbind-key t
bind t display-popup -d "#{pane_current_path}" -E "zsh"
bind -n M-s display-popup -w 100% -h 100% -E "$HOME/.scripts/tmux-session-picker"
bind -n M-a previous-window
bind -n M-d next-window
bind-key v copy-mode
bind-key P paste-buffer -p

# Open splits and new windows in the current pane's path.
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind C-c new-window -c "#{pane_current_path}"

# Pane navigation: Prefix + h/j/k/l
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
unbind-key x
bind-key x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind-key X kill-pane
bind-key C-x kill-pane

# Keep Ctrl-l as the normal in-pane clear/redraw key.
bind-key -n C-l send-keys C-l

# Appearance
# Machine-specific accent color (export HAL_THEME_COLOR in ~/.zshrc.local).
set -g @hal_theme_accent_bg 'colour52'
set -g @hal_theme_mode_bg 'colour220'
if-shell '[ "$HAL_THEME_COLOR" = "blue" ]' "set -g @hal_theme_accent_bg 'colour25'; set -g @hal_theme_mode_bg 'colour117'"
if-shell '[ "$HAL_THEME_COLOR" = "green" ]' "set -g @hal_theme_accent_bg 'colour28'; set -g @hal_theme_mode_bg 'colour119'"

set -g status on
set -g status-position bottom
set -g status-interval 1
set -g status-justify left
set -g status-style 'fg=colour15,bg=default'

# Better readability and visual hierarchy for windows.
set -g window-status-separator ''
set -g window-status-style 'fg=colour15,bg=default'
set -g window-status-format ' #I #W '
set -g window-status-current-style 'fg=colour15,bg=#{@hal_theme_accent_bg},bold'
set -g window-status-current-format ' #I #W '
set -g window-status-activity-style 'fg=colour15,bg=default,bold'
set -g window-status-bell-style 'fg=colour15,bg=default,bold'
set -g window-status-last-style 'fg=colour15,bg=default,bold'

# Left: active session. Right: current path + date/time.
set -g status-left-length 24
set -g status-right-length 96
set -g status-left '#[fg=colour0,bg=colour244,bold] #S #[default]'
set -g status-right '#[fg=colour15,bg=#{@hal_theme_accent_bg}] #H #[fg=colour0,bg=colour244] %a %b %d %H:%M:%S #[default]'

# Keep command and copy mode readable.
set -g message-style 'fg=colour15,bg=#{@hal_theme_accent_bg},bold'
set -g message-command-style 'fg=colour15,bg=#{@hal_theme_accent_bg},bold'
set -g mode-style 'fg=colour0,bg=#{@hal_theme_mode_bg},bold'
setw -g clock-mode-colour colour220
if-shell '[ "$HAL_THEME_COLOR" = "blue" ]' "setw -g clock-mode-colour colour117"
if-shell '[ "$HAL_THEME_COLOR" = "green" ]' "setw -g clock-mode-colour colour119"
set -g pane-border-lines heavy
set -g pane-border-style 'fg=colour245'
set -g pane-active-border-style 'fg=colour231,bold'

# Quiet statusline behavior.
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none



# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @shell_mode 'vi'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
